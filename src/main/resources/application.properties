# Server Configuration
server.port=8083
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/fitlife_reservas_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.fitlife.reservas=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Application Info
spring.application.name=MS-reservas
management.endpoints.web.exposure.include=health,info,circuitbreakers

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.reservasCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.reservasCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.reservasCB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.reservasCB.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.reservasCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.reservasCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.reservasCB.slowCallRateThreshold=100
resilience4j.circuitbreaker.instances.reservasCB.slowCallDurationThreshold=2s

# Resilience4j Retry Configuration
resilience4j.retry.instances.reservasRetry.maxAttempts=3
resilience4j.retry.instances.reservasRetry.waitDuration=1s
resilience4j.retry.instances.reservasRetry.retryExceptions=java.io.IOException,java.util.concurrent.TimeoutException
